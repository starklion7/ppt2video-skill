<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPT2Video</title>
    <link rel="stylesheet" href="./style.css?v=20260707-frontend-mirror-1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="upload-page active" id="upload-page">
        <header class="page-header">
          <div class="brand-pill">
            <div class="brand-pill__icon">P</div>
            <span>PPT2Video</span>
          </div>
          <h1 class="page-header__title">欢迎使用PPT2Video</h1>
        </header>

        <section class="flow-strip" aria-label="流程">
          <span class="flow-strip__text">上传讲解材料</span>
          <span class="flow-strip__sep">&gt;</span>
          <span class="flow-strip__text">选择讲解风格</span>
          <span class="flow-strip__sep">&gt;</span>
          <span class="flow-strip__text">AI智能生成</span>
        </section>

        <section class="upload-card-wrap">
          <label
            class="upload-card"
            id="upload-card"
            for="ppt-file"
          >
            <input id="ppt-file" type="file" accept=".ppt,.pptx,.pdf" hidden />
            <div class="upload-card__empty" id="upload-empty">
              <div class="upload-card__logo">PPT</div>
              <p class="upload-card__title">点击上传或拖拽文件</p>
              <p class="upload-card__hint">支持 .ppt、.pptx、.pdf 格式，文件大小建议不超过 100MB，文件过大请耐心等待</p>
            </div>
            <div class="upload-card__file hidden" id="upload-file-state">
              <div class="upload-card__file-logo" id="upload-file-logo">PPT</div>
              <div class="upload-card__file-row">
                <span class="upload-card__file-name" id="selected-file-name"></span>
                <button type="button" class="upload-card__remove" id="remove-file-button">删除</button>
              </div>
            </div>
          </label>
        </section>

        <section class="video-style" aria-label="视频风格">
          <span class="video-style__label">讲解风格：</span>
          <div class="video-style__options" id="realtime-level-group">
            <button class="style-option active" data-value="brief" type="button">简单</button>
            <button class="style-option" data-value="moderate" type="button">适中</button>
            <button class="style-option" data-value="detailed" type="button">详细</button>
          </div>
        </section>

        <div class="generate-wrap">
          <button id="submit-button" class="generate-button" type="button">
            <span class="generate-button__icon">▶</span>
            <span id="submit-button-text">生成讲解</span>
          </button>
        </div>

        <section class="service-dock">
          <div class="service-dock__state">
            <span class="service-dock__dot" id="service-dot"></span>
            <span id="service-state">未检查</span>
          </div>
          <div class="service-dock__copy">
            <label class="service-dock__field hidden">
              <span>服务入口地址</span>
              <input id="base-url" type="url" value="http://36.140.182.229:60010/qilinvideo" />
            </label>
            <label class="service-dock__field hidden">
              <span>服务 Key</span>
              <input id="service-key" type="password" placeholder="SERVICE_API_KEY" />
            </label>
            <div class="service-dock__mcp" id="mcp-url-preview"></div>
          </div>
          <button id="check-service-button" class="service-dock__button" type="button">检查服务</button>
        </section>
      </section>

      <section class="playback-page" id="playback-page">
        <header class="app-header">
          <div class="app-header__brand">
            <span class="app-header__ppt-name" id="ppt-name">PPT2Video</span>
          </div>
          <div class="app-header__actions">
            <button class="header-btn header-btn--green" id="download-script-button" type="button">导出字幕</button>
            <button class="header-btn header-btn--purple" id="import-script-button" type="button">导入字幕</button>
            <button class="header-btn header-btn--primary" id="fullscreen-button" type="button">全屏播放</button>
            <button class="header-btn header-btn--primary" id="download-video-button" type="button">下载视频</button>
          </div>
        </header>

        <div class="playback-body">
          <div class="gen-progress" id="gen-progress">
            <div class="gen-progress__fill" id="progress-fill"></div>
            <span class="gen-progress__label" id="progress-text">等待任务开始</span>
            <span class="gen-progress__percent" id="progress-percent">0%</span>
          </div>

          <div class="playback-layout">
            <aside class="sidebar">
              <div class="sidebar__head">
                <span class="sidebar__title">讲解目录</span>
                <span class="sidebar__count" id="chapter-total">0 页</span>
              </div>
              <div class="sidebar__nav" id="chapter-list"></div>
              <div class="sidebar__generating" id="sidebar-generating">
                <div class="sidebar-loading-card">
                  <div class="sidebar-loading-card__title">AI 正在努力生成</div>
                  <div class="sidebar-loading-card__subtitle">正在组织结构、润色表达并检查细节</div>
                  <div class="sidebar-loading-card__progress"></div>
                  <div class="sidebar-loading-card__tip">请稍候，精彩内容马上呈现</div>
                </div>
              </div>
            </aside>

            <section class="workbench">
              <span class="workbench__duration-tag" id="duration-pill">全文讲解时长: 估算中...</span>
              <div class="workbench__main">
                <div class="player-area">
                  <div class="player-area__video-shell">
                    <div class="player-area__video-frame">
                      <div class="player-area__video-frame-inner">
                        <div class="player-area__video-media">
                          <img id="preview-image" alt="" hidden />
                          <div class="player-area__skeleton" id="video-placeholder">
                            <div class="player-area__skeleton-block" aria-hidden="true"></div>
                            <div class="player-area__status-hint" id="stage-chip">等待开始</div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="player-area__video-controls">
                      <div class="player-area__controls">
                        <button type="button" class="player-area__play-btn" id="play-button">▶</button>
                        <span class="player-area__time" id="current-time">0:00</span>
                        <div class="seek-bar">
                          <div class="seek-bar__track">
                            <div class="seek-bar__filled" id="seek-filled"></div>
                            <input id="timeline" type="range" min="0" max="100" value="0" />
                          </div>
                        </div>
                        <span class="player-area__time" id="total-time">0:00</span>
                        <button type="button" class="player-area__speed-btn" id="speed-button">1x</button>
                      </div>
                    </div>
                  </div>
                </div>

                <section class="subtitle-panel">
                  <div class="subtitle-panel__head">
                    <span class="subtitle-panel__title">字幕</span>
                    <div class="subtitle-panel__head-right">
                      <button id="save-script-button" class="subtitle-btn subtitle-btn--primary" type="button">保存</button>
                      <button id="cancel-script-button" class="subtitle-btn subtitle-btn--default" type="button">取消</button>
                      <button id="edit-script-button" class="subtitle-btn subtitle-btn--default" type="button">编辑</button>
                    </div>
                  </div>
                  <div class="subtitle-panel__body">
                    <textarea id="script-editor" class="subtitle-panel__textarea" readonly placeholder="字幕生成中..."></textarea>
                  </div>
                </section>
              </div>

              <aside class="meta-panel">
                <div class="meta-panel__item">
                  <div class="meta-panel__label">任务 ID</div>
                  <div class="meta-panel__value" id="task-id">-</div>
                </div>
                <div class="meta-panel__item">
                  <div class="meta-panel__label">阶段</div>
                  <div class="meta-panel__value" id="task-stage">-</div>
                </div>
                <div class="meta-panel__item">
                  <div class="meta-panel__label">详情</div>
                  <div class="meta-panel__value" id="task-detail">-</div>
                </div>
              </aside>
            </section>
          </div>
        </div>
      </section>
    </main>

    <a id="download-anchor" hidden></a>
    <script src="./app.js?v=20260707-frontend-mirror-1"></script>
  </body>
</html>
