<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPT2Video Local</title>
    <link rel="stylesheet" href="./style.css?v=20260707-local-sync-1" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">P</div>
          <div class="brand-text">PPT2Video</div>
        </div>

        <button class="nav-tab active" data-tab="upload" type="button">
          <span class="nav-title">上传页</span>
          <span class="nav-subtitle">上传课件并生成讲解</span>
        </button>
        <button class="nav-tab" data-tab="player" type="button">
          <span class="nav-title">讲解页</span>
          <span class="nav-subtitle">查看进度与下载视频</span>
        </button>

        <div class="mcp-card">
          <div class="mcp-row">
            <span class="mcp-dot" id="service-dot"></span>
            <span id="service-state">未检查</span>
          </div>
          <div class="mcp-url" id="mcp-url-preview"></div>
          <button id="check-service-button" class="ghost-btn full" type="button">检查服务</button>
        </div>
      </aside>

      <main class="content">
        <section class="tab-panel active" data-panel="upload">
          <header class="topbar">
            <div>
              <h1>上传 PPT 生成讲解</h1>
              <p class="muted">支持 PPT / PPTX / PDF</p>
            </div>
          </header>

          <section class="upload-hero">
            <label class="upload-card" for="ppt-file">
              <input id="ppt-file" type="file" accept=".ppt,.pptx,.pdf" hidden />
              <div class="upload-icon">PPT</div>
              <div class="upload-copy">
                <div class="upload-title" id="selected-file-name">点击上传或拖拽文件</div>
                <div class="upload-subtitle">支持 .ppt / .pptx / .pdf，建议不超过 100MB</div>
              </div>
            </label>

            <div class="toolbar">
              <div class="toolbar-block grow">
                <div class="toolbar-label">实时详细度</div>
                <div class="segmented" id="realtime-level-group">
                  <button class="seg active" data-value="brief" type="button">简单</button>
                  <button class="seg" data-value="moderate" type="button">适中</button>
                  <button class="seg" data-value="detailed" type="button">详细</button>
                </div>
              </div>

              <label class="toolbar-block short">
                <span class="toolbar-label">时长</span>
                <input id="duration" type="number" min="1" max="30" step="1" value="5" />
              </label>

              <label class="toolbar-block short">
                <span class="toolbar-label">模式</span>
                <select id="mode">
                  <option value="realtime" selected>实时</option>
                  <option value="normal">非实时</option>
                </select>
              </label>

              <label class="checkbox-wrap">
                <input id="mouse-tracking" type="checkbox" />
                <span>圈选跟随</span>
              </label>

              <button id="submit-button" class="primary-btn" type="button">生成讲解</button>
            </div>
          </section>

          <section class="config-strip hidden" id="config-strip">
            <label>
              <span>服务入口地址</span>
              <input id="base-url" type="url" value="http://36.140.182.229:60010/qilinvideo" />
            </label>
            <label>
              <span>服务 Key</span>
              <input id="service-key" type="password" placeholder="SERVICE_API_KEY" />
            </label>
          </section>
        </section>

        <section class="tab-panel" data-panel="player">
          <header class="topbar">
            <div class="file-header">
              <div class="file-badge">P</div>
              <div>
                <h1 id="ppt-name">PPT2Video</h1>
                <p class="muted" id="task-summary">等待任务开始</p>
              </div>
            </div>
            <div class="top-actions">
              <button id="download-script-button" class="light-green" type="button">导出字幕</button>
              <button id="import-script-button" class="light-purple" type="button">导入字幕</button>
              <button id="fullscreen-button" class="blue-btn" type="button">全屏播放</button>
              <button id="download-video-button" class="blue-btn" type="button">下载视频</button>
            </div>
          </header>

          <div class="player-grid">
            <section class="player-left">
              <div class="status-bar">
                <div class="progress-track">
                  <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text" id="progress-text">等待任务开始</div>
              </div>

              <div class="chapter-header">
                <h2>讲解目录</h2>
                <span id="chapter-total">0 页</span>
              </div>
              <div class="chapter-list" id="chapter-list"></div>
            </section>

            <section class="player-main">
              <div class="preview-header">
                <h2>讲解预览</h2>
                <span class="duration-pill" id="duration-pill">全文讲解时长: 估算中...</span>
              </div>
              <div class="preview-card">
                <div class="video-stage" id="video-stage">
                  <img id="preview-image" alt="" hidden />
                  <div class="video-placeholder" id="video-placeholder">
                    <div class="video-thumb"></div>
                    <div class="video-tip">上传课件并生成后，这里会展示讲解页面。</div>
                    <div class="status-chip" id="stage-chip">等待开始</div>
                  </div>
                </div>
                <div class="player-controls">
                  <button class="control-btn" id="play-button" type="button">▶</button>
                  <span id="current-time">0:00</span>
                  <input id="timeline" type="range" min="0" max="100" value="0" />
                  <span id="total-time">0:00</span>
                  <button class="speed-btn" id="speed-button" type="button">1x</button>
                </div>
              </div>
            </section>

            <section class="player-right">
              <div class="script-header">
                <h2>字幕</h2>
                <button id="edit-script-button" class="ghost-btn" type="button">编辑</button>
              </div>
              <textarea id="script-editor" class="script-box" readonly placeholder="字幕生成中..."></textarea>
              <div class="script-actions">
                <button id="save-script-button" class="blue-btn" type="button">保存</button>
                <button id="cancel-script-button" class="ghost-btn" type="button">取消</button>
              </div>
              <div class="meta-panel">
                <div class="meta-item">
                  <div class="meta-label">任务 ID</div>
                  <div class="meta-value" id="task-id">-</div>
                </div>
                <div class="meta-item">
                  <div class="meta-label">阶段</div>
                  <div class="meta-value" id="task-stage">-</div>
                </div>
                <div class="meta-item">
                  <div class="meta-label">详情</div>
                  <div class="meta-value" id="task-detail">-</div>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <a id="download-anchor" hidden></a>
    <script src="./app.js?v=20260707-local-sync-1"></script>
  </body>
</html>
